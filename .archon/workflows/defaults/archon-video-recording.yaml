name: archon-video-recording
description: |
  Use when: Running the Archon harness live test for UI video recording.
  Does: Uses an agent to infer and run the requested UI test with Playwright or Remotion,
        publishes the recording artifact branch, and comments a GitHub-hosted recording link on the initial issue.
  NOT for: Real application QA, broad UI validation, production changes, or Remotion generation.

provider: codex
model: gpt-5.5
modelReasoningEffort: low

nodes:
  - id: prepare
    bash: |
      set -euo pipefail

      REQUEST=$(cat <<'EOF'
      $ARGUMENTS
      EOF
      )

      SESSION=$(printf '%s\n' "$REQUEST" | grep -oE '\[archon-test:[^]]+\]' | head -1 | sed -E 's/^\[archon-test:([^]]+)\]$/\1/' || true)
      CONTEXT_JSON=$(printf '%s\n' "$REQUEST" | sed -nE 's/^ARCHON_BACKLOG_CONTEXT_JSON: (.+)$/\1/p' | head -1)
      ISSUE_NUM=""
      BRANCH=""

      if [ -n "$CONTEXT_JSON" ]; then
        ISSUE_NUM=$(printf '%s' "$CONTEXT_JSON" | jq -r '.issueNumber // empty')
        BRANCH=$(printf '%s' "$CONTEXT_JSON" | jq -r '.branch // empty')
      fi

      if [ -z "$ISSUE_NUM" ]; then
        ISSUE_NUM=$(printf '%s\n' "$REQUEST" | grep -oE '(Fix issue|Issue:)[[:space:]]*#[0-9]+' | head -1 | grep -oE '[0-9]+' || true)
      fi

      if [ -z "$BRANCH" ]; then
        BRANCH=$(printf '%s\n' "$REQUEST" | grep -oE 'Use branch: [^[:space:]]+' | head -1 | sed -E 's/^Use branch: //' || true)
      fi

      if [ -z "$SESSION" ] && [ -n "$ISSUE_NUM" ]; then
        SESSION="issue-${ISSUE_NUM}"
      fi

      if [ -z "$SESSION" ] || [ -z "$ISSUE_NUM" ] || [ -z "$BRANCH" ]; then
        echo "Failed to parse required test fields" >&2
        echo "SESSION=$SESSION ISSUE_NUM=$ISSUE_NUM BRANCH=$BRANCH" >&2
        exit 1
      fi

      case "$BRANCH" in
        archon-test/*|archon/*) ;;
        *)
          echo "Refusing non-test branch: $BRANCH" >&2
          exit 1
          ;;
      esac

      VIDEO_FILE="archon-test/${SESSION}-${ISSUE_NUM}-ui-recording.mp4"
      SUMMARY_FILE="archon-test/${SESSION}-${ISSUE_NUM}-ui-recording.md"
      RUN_DIR="$ARTIFACTS_DIR/playwright-recording"
      mkdir -p "$RUN_DIR"
      {
        echo "SESSION=$SESSION"
        echo "ISSUE_NUM=$ISSUE_NUM"
        echo "BRANCH=$BRANCH"
        echo "VIDEO_FILE=$VIDEO_FILE"
        echo "SUMMARY_FILE=$SUMMARY_FILE"
        echo "RUN_DIR=$RUN_DIR"
      } > "$ARTIFACTS_DIR/test.env"

      echo "Prepared video recording test for issue #$ISSUE_NUM on $BRANCH"

  - id: record-ui
    depends_on: [prepare]
    prompt: |
      You are running an Archon live test workflow whose job is to create a short UI
      test recording and report the recording artifact back to the originating GitHub issue.

      ## Workflow request

      $ARGUMENTS

      ## Required outputs

      By the end of this node, create these files:

      - `$ARTIFACTS_DIR/.recorded-video-path`
        - Contains the absolute path to the final non-empty `.mp4` recording file.
        - Playwright may record `.webm` internally, but convert the final artifact to `.mp4`.
        - Use `ffmpeg` for conversion when available, for example:
          `ffmpeg -y -i input.webm -c:v libx264 -pix_fmt yuv420p -movflags +faststart output.mp4`.
      - `$ARTIFACTS_DIR/recording-summary.md`
        - Briefly describe what you tested, how you ran it, what assertion passed, and where the local recording lives.

      ## How to choose the test

      Read the context instead of following a canned script:

      1. Read `AGENTS.md` if present. Only fall back to `CLAUDE.md` when there is no `AGENTS.md`.
      2. Read `$ARTIFACTS_DIR/test.env` to get `ISSUE_NUM`, `SESSION`, and `RUN_DIR`.
      3. Use `gh issue view "$ISSUE_NUM" --json title,body,comments,labels` to read the issue.
      4. Infer the UI scenario from the issue body or comments. Prefer explicit sections like
         "UI test description", "Acceptance criteria", "Steps", or similar.
      5. Inspect the repository to find the relevant app, package manager, dev command, and test conventions.

      ## Recording guidance

      - Prefer Playwright browser video recording for interactive UI workflows, then convert to MP4.
      - If the repo already has Playwright installed, use the repo pattern.
      - Otherwise create a temporary Playwright harness under `RUN_DIR`; do not add dependencies or lockfile changes to the repo.
      - If the app can run locally, start it on a free port, record the requested flow, and stop it before finishing.
      - If the issue explicitly asks to record a synthetic or generated UI and there is no runnable app,
        you may create a disposable fixture under `RUN_DIR` that represents the described UI.
      - Use accessible selectors where possible, but adapt to the actual UI.
      - Keep the recording short and deterministic.
      - Add small pauses so a human can follow the recording:
        - Wait about 500-1000 ms after the initial loaded state.
        - Wait about 500-1000 ms after each meaningful user action.
        - Wait about 1000-1500 ms on the final success state before closing the browser.
        - Do not use long sleeps to hide flaky waits; still wait on real UI conditions first.

      ## Guardrails

      - Do not open a PR.
      - Do not modify source files, package files, lockfiles, CI, or docs in the repository.
      - You may write scripts, fixtures, logs, screenshots, and recordings only under `RUN_DIR` or `$ARTIFACTS_DIR`.
      - If you start servers or browsers, clean them up.
      - Fail loudly if you cannot produce a non-empty `.mp4` recording.
      - Do not commit or push anything yourself; the publish node handles the scoped artifact commit.

      Use Bash/Read/Write/Edit as needed, but keep all generated files in the artifact directories.
    allowed_tools:
      - Bash
      - Read
      - Write
      - Edit
      - Glob
      - Grep
    idle_timeout: 1800000

  - id: publish-artifact
    depends_on: [record-ui]
    bash: |
      set -euo pipefail
      . "$ARTIFACTS_DIR/test.env"

      BASE="${BASE_BRANCH:-main}"
      git fetch origin "$BASE" --quiet
      git checkout -B "$BRANCH" "origin/$BASE"

      RECORDED_VIDEO=$(cat "$ARTIFACTS_DIR/.recorded-video-path")
      if [ ! -s "$RECORDED_VIDEO" ]; then
        echo "Recorded video was not created or is empty: $RECORDED_VIDEO" >&2
        exit 1
      fi

      case "$RECORDED_VIDEO" in
        *.mp4) ;;
        *)
          echo "Recording must be .mp4: $RECORDED_VIDEO" >&2
          exit 1
          ;;
      esac

      mkdir -p "$(dirname "$VIDEO_FILE")"
      cp "$RECORDED_VIDEO" "$VIDEO_FILE"

      SUMMARY_PATH="$ARTIFACTS_DIR/recording-summary.md"
      if [ -s "$ARTIFACTS_DIR/recording-summary.md" ]; then
        cp "$ARTIFACTS_DIR/recording-summary.md" "$SUMMARY_FILE"
      else
        SUMMARY_BODY="Recording completed. No detailed summary file was produced."
        printf '%s\n' "$SUMMARY_BODY" > "$SUMMARY_PATH"
        cp "$SUMMARY_PATH" "$SUMMARY_FILE"
      fi

      VIDEO_SIZE=$(wc -c < "$RECORDED_VIDEO" | tr -d ' ')

      {
        echo "VIDEO_FILE=$VIDEO_FILE"
        echo "SUMMARY_FILE=$SUMMARY_FILE"
        echo "VIDEO_SIZE=$VIDEO_SIZE"
      } > "$ARTIFACTS_DIR/published.env"

      git add "$VIDEO_FILE" "$SUMMARY_FILE"
      git commit -m "test: add Archon test UI recording artifact"

      {
        echo "# Test Video Recording"
        echo
        echo "- Issue: #$ISSUE_NUM"
        echo "- Branch: $BRANCH"
        echo "- Video: $VIDEO_FILE"
        echo "- Video size bytes: $VIDEO_SIZE"
        echo "- Summary: $SUMMARY_FILE"
      } > "$ARTIFACTS_DIR/implementation.md"

  - id: comment-recording-link
    depends_on: [publish-artifact]
    bash: |
      set -euo pipefail
      . "$ARTIFACTS_DIR/test.env"
      . "$ARTIFACTS_DIR/published.env"

      git push -u origin "$BRANCH"

      REPO=$(gh repo view --json nameWithOwner -q '.nameWithOwner')
      RAW_VIDEO_URL="https://raw.githubusercontent.com/${REPO}/refs/heads/${BRANCH}/${VIDEO_FILE}"
      RAW_SUMMARY_URL="https://raw.githubusercontent.com/${REPO}/refs/heads/${BRANCH}/${SUMMARY_FILE}"

      COMMENT=$(cat <<EOF
      Archon test UI recording completed.

      - Recording: ${RAW_VIDEO_URL}
      - Recording size: ${VIDEO_SIZE} bytes
      - Summary: ${RAW_SUMMARY_URL}
      - Artifact branch: \`${BRANCH}\`
      - Tool: Playwright/Remotion recording converted to MP4
      EOF
      )
      gh issue comment "$ISSUE_NUM" --body "$COMMENT"

      echo "$RAW_VIDEO_URL" > "$ARTIFACTS_DIR/.video-url"
      echo "$RAW_SUMMARY_URL" > "$ARTIFACTS_DIR/.summary-url"
      echo "Commented GitHub-hosted recording link on issue #$ISSUE_NUM: $RAW_VIDEO_URL"
